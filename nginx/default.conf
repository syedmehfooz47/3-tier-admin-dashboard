upstream client_service {
    server client:3000;
}

upstream server_service {
    server server:9000;
}

server {
    listen 80;
    server_name localhost;

    # API Proxy (Forward requests starting with /api/ to backend server)
    location /api/ {
        # Strip '/api' prefix from request URI before proxying
        rewrite ^/api/(.*)$ /$1 break;
        
        proxy_pass http://server_service;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Frontend Proxy (Forward all other requests to React client container)
    location / {
        proxy_pass http://client_service;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
