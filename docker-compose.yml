version: "3.8"

services:
  mongodb:
    image: mongo:6.0
    container_name: mongodb_cont
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - admin-dashboard-network

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: server_cont
    restart: always
    environment:
      - PORT=9000
      - MONGO_URI=mongodb://mongodb:27017/admin_db
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:9000/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - admin-dashboard-network

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: client_cont
    restart: always
    expose:
      - "3000"
    depends_on:
      server:
        condition: service_healthy
    networks:
      - admin-dashboard-network

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    container_name: nginx_cont
    restart: always
    ports:
      - "80:80"
    depends_on:
      - client
      - server
    networks:
      - admin-dashboard-network

volumes:
  mongodb_data:

networks:
  admin-dashboard-network:
    name: admin-dashboard-network
